name: Benchmark Component Tests

on:
  pull_request:
    paths:
      - 'cmd/benchmarkservice/**'
      - 'internal/benchmark/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-tests.yml'
  push:
    branches: [main]
    paths:
      - 'cmd/benchmarkservice/**'
      - 'internal/benchmark/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/benchmark-tests.yml'

permissions:
  contents: read

jobs:
  benchmark-tests:
    name: Run Benchmark Component Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Run benchmark tests
        run: go test -count=1 -v -cover ./internal/benchmark ./cmd/benchmarkservice
